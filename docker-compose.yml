services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/chipcoin-entrypoint", "node"]
    environment:
      TZ: Europe/Rome
      CHIPCOIN_NETWORK: ${CHIPCOIN_NETWORK}
      CHIPCOIN_RUNTIME_DIR: ${CHIPCOIN_RUNTIME_DIR:-}
      NODE_LOG_LEVEL: ${NODE_LOG_LEVEL}
      NODE_P2P_BIND_PORT: ${NODE_P2P_BIND_PORT}
      NODE_HTTP_BIND_PORT: ${NODE_HTTP_BIND_PORT}
      CHIPCOIN_HTTP_ALLOWED_ORIGINS: ${CHIPCOIN_HTTP_ALLOWED_ORIGINS:-}
      PING_INTERVAL_SECONDS: ${PING_INTERVAL_SECONDS:-2.0}
      P2P_READ_TIMEOUT_SECONDS: ${P2P_READ_TIMEOUT_SECONDS:-15.0}
      P2P_WRITE_TIMEOUT_SECONDS: ${P2P_WRITE_TIMEOUT_SECONDS:-15.0}
      P2P_HANDSHAKE_TIMEOUT_SECONDS: ${P2P_HANDSHAKE_TIMEOUT_SECONDS:-5.0}
      PEER_DISCOVERY_ENABLED: ${PEER_DISCOVERY_ENABLED:-true}
      PEERBOOK_MAX_SIZE: ${PEERBOOK_MAX_SIZE:-1024}
      PEER_ADDR_MAX_PER_MESSAGE: ${PEER_ADDR_MAX_PER_MESSAGE:-250}
      PEER_ADDR_RELAY_LIMIT_PER_INTERVAL: ${PEER_ADDR_RELAY_LIMIT_PER_INTERVAL:-250}
      PEER_ADDR_RELAY_INTERVAL_SECONDS: ${PEER_ADDR_RELAY_INTERVAL_SECONDS:-30}
      PEER_STALE_AFTER_SECONDS: ${PEER_STALE_AFTER_SECONDS:-604800}
      PEER_RETRY_BACKOFF_BASE_SECONDS: ${PEER_RETRY_BACKOFF_BASE_SECONDS:-1}
      PEER_RETRY_BACKOFF_MAX_SECONDS: ${PEER_RETRY_BACKOFF_MAX_SECONDS:-30}
      PEER_DISCOVERY_STARTUP_PREFER_PERSISTED: ${PEER_DISCOVERY_STARTUP_PREFER_PERSISTED:-true}
      HEADERS_SYNC_ENABLED: ${HEADERS_SYNC_ENABLED:-true}
      HEADERS_MAX_PER_MESSAGE: ${HEADERS_MAX_PER_MESSAGE:-2000}
      BLOCK_DOWNLOAD_WINDOW_SIZE: ${BLOCK_DOWNLOAD_WINDOW_SIZE:-128}
      BLOCK_MAX_INFLIGHT_PER_PEER: ${BLOCK_MAX_INFLIGHT_PER_PEER:-16}
      BLOCK_REQUEST_TIMEOUT_SECONDS: ${BLOCK_REQUEST_TIMEOUT_SECONDS:-15}
      HEADERS_SYNC_PARALLEL_PEERS: ${HEADERS_SYNC_PARALLEL_PEERS:-2}
      HEADERS_SYNC_START_HEIGHT_GAP_THRESHOLD: ${HEADERS_SYNC_START_HEIGHT_GAP_THRESHOLD:-1}
      INITIAL_SYNC_CONSERVATIVE_DEFAULTS: ${INITIAL_SYNC_CONSERVATIVE_DEFAULTS:-true}
      BOOTSTRAP_PEER_LIMIT: ${BOOTSTRAP_PEER_LIMIT:-4}
      PEER_MISBEHAVIOR_WARNING_THRESHOLD: ${PEER_MISBEHAVIOR_WARNING_THRESHOLD:-25}
      PEER_MISBEHAVIOR_DISCONNECT_THRESHOLD: ${PEER_MISBEHAVIOR_DISCONNECT_THRESHOLD:-50}
      PEER_MISBEHAVIOR_BAN_THRESHOLD: ${PEER_MISBEHAVIOR_BAN_THRESHOLD:-100}
      PEER_MISBEHAVIOR_BAN_DURATION_SECONDS: ${PEER_MISBEHAVIOR_BAN_DURATION_SECONDS:-1800}
      PEER_MISBEHAVIOR_DECAY_INTERVAL_SECONDS: ${PEER_MISBEHAVIOR_DECAY_INTERVAL_SECONDS:-300}
      PEER_MISBEHAVIOR_DECAY_STEP: ${PEER_MISBEHAVIOR_DECAY_STEP:-5}
      NODE_DIRECT_PEERS: ${NODE_DIRECT_PEERS-__CHIPCOIN_UNSET__}
      NODE_DIRECT_PEER: ${NODE_DIRECT_PEER-__CHIPCOIN_UNSET__}
      NODE_BOOTSTRAP_URL: ${NODE_BOOTSTRAP_URL-__CHIPCOIN_UNSET__}
      DIRECT_PEERS: ${DIRECT_PEERS-__CHIPCOIN_UNSET__}
      DIRECT_PEER: ${DIRECT_PEER-__CHIPCOIN_UNSET__}
      BOOTSTRAP_URL: ${BOOTSTRAP_URL-__CHIPCOIN_UNSET__}
    ports:
      - "${NODE_P2P_BIND_PORT}:${NODE_P2P_BIND_PORT}"
      - "${NODE_HTTP_BIND_PORT}:${NODE_HTTP_BIND_PORT}"
    volumes:
      - type: bind
        source: ${NODE_DATA_PATH}
        target: /runtime/node.sqlite3
    restart: unless-stopped

  miner:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/chipcoin-entrypoint", "miner"]
    environment:
      TZ: Europe/Rome
      CHIPCOIN_NETWORK: ${CHIPCOIN_NETWORK}
      CHIPCOIN_RUNTIME_DIR: ${CHIPCOIN_RUNTIME_DIR:-}
      MINER_LOG_LEVEL: ${MINER_LOG_LEVEL}
      MINER_P2P_BIND_PORT: ${MINER_P2P_BIND_PORT}
      MINING_MIN_INTERVAL_SECONDS: ${MINING_MIN_INTERVAL_SECONDS}
      PING_INTERVAL_SECONDS: ${PING_INTERVAL_SECONDS:-2.0}
      P2P_READ_TIMEOUT_SECONDS: ${P2P_READ_TIMEOUT_SECONDS:-15.0}
      P2P_WRITE_TIMEOUT_SECONDS: ${P2P_WRITE_TIMEOUT_SECONDS:-15.0}
      P2P_HANDSHAKE_TIMEOUT_SECONDS: ${P2P_HANDSHAKE_TIMEOUT_SECONDS:-5.0}
      PEER_DISCOVERY_ENABLED: ${PEER_DISCOVERY_ENABLED:-true}
      PEERBOOK_MAX_SIZE: ${PEERBOOK_MAX_SIZE:-1024}
      PEER_ADDR_MAX_PER_MESSAGE: ${PEER_ADDR_MAX_PER_MESSAGE:-250}
      PEER_ADDR_RELAY_LIMIT_PER_INTERVAL: ${PEER_ADDR_RELAY_LIMIT_PER_INTERVAL:-250}
      PEER_ADDR_RELAY_INTERVAL_SECONDS: ${PEER_ADDR_RELAY_INTERVAL_SECONDS:-30}
      PEER_STALE_AFTER_SECONDS: ${PEER_STALE_AFTER_SECONDS:-604800}
      PEER_RETRY_BACKOFF_BASE_SECONDS: ${PEER_RETRY_BACKOFF_BASE_SECONDS:-1}
      PEER_RETRY_BACKOFF_MAX_SECONDS: ${PEER_RETRY_BACKOFF_MAX_SECONDS:-30}
      PEER_DISCOVERY_STARTUP_PREFER_PERSISTED: ${PEER_DISCOVERY_STARTUP_PREFER_PERSISTED:-true}
      HEADERS_SYNC_ENABLED: ${HEADERS_SYNC_ENABLED:-true}
      HEADERS_MAX_PER_MESSAGE: ${HEADERS_MAX_PER_MESSAGE:-2000}
      BLOCK_DOWNLOAD_WINDOW_SIZE: ${BLOCK_DOWNLOAD_WINDOW_SIZE:-128}
      BLOCK_MAX_INFLIGHT_PER_PEER: ${BLOCK_MAX_INFLIGHT_PER_PEER:-16}
      BLOCK_REQUEST_TIMEOUT_SECONDS: ${BLOCK_REQUEST_TIMEOUT_SECONDS:-15}
      HEADERS_SYNC_PARALLEL_PEERS: ${HEADERS_SYNC_PARALLEL_PEERS:-2}
      HEADERS_SYNC_START_HEIGHT_GAP_THRESHOLD: ${HEADERS_SYNC_START_HEIGHT_GAP_THRESHOLD:-1}
      INITIAL_SYNC_CONSERVATIVE_DEFAULTS: ${INITIAL_SYNC_CONSERVATIVE_DEFAULTS:-true}
      BOOTSTRAP_PEER_LIMIT: ${BOOTSTRAP_PEER_LIMIT:-4}
      PEER_MISBEHAVIOR_WARNING_THRESHOLD: ${PEER_MISBEHAVIOR_WARNING_THRESHOLD:-25}
      PEER_MISBEHAVIOR_DISCONNECT_THRESHOLD: ${PEER_MISBEHAVIOR_DISCONNECT_THRESHOLD:-50}
      PEER_MISBEHAVIOR_BAN_THRESHOLD: ${PEER_MISBEHAVIOR_BAN_THRESHOLD:-100}
      PEER_MISBEHAVIOR_BAN_DURATION_SECONDS: ${PEER_MISBEHAVIOR_BAN_DURATION_SECONDS:-1800}
      PEER_MISBEHAVIOR_DECAY_INTERVAL_SECONDS: ${PEER_MISBEHAVIOR_DECAY_INTERVAL_SECONDS:-300}
      PEER_MISBEHAVIOR_DECAY_STEP: ${PEER_MISBEHAVIOR_DECAY_STEP:-5}
      MINER_DIRECT_PEERS: ${MINER_DIRECT_PEERS-__CHIPCOIN_UNSET__}
      MINER_DIRECT_PEER: ${MINER_DIRECT_PEER-__CHIPCOIN_UNSET__}
      MINER_BOOTSTRAP_URL: ${MINER_BOOTSTRAP_URL-__CHIPCOIN_UNSET__}
      MINER_DEFAULT_DIRECT_PEERS: ${MINER_DEFAULT_DIRECT_PEERS-node:18444}
      DIRECT_PEERS: ${DIRECT_PEERS-__CHIPCOIN_UNSET__}
      DIRECT_PEER: ${DIRECT_PEER-__CHIPCOIN_UNSET__}
      BOOTSTRAP_URL: ${BOOTSTRAP_URL-__CHIPCOIN_UNSET__}
    ports:
      - "${MINER_P2P_BIND_PORT}:${MINER_P2P_BIND_PORT}"
    volumes:
      - type: bind
        source: ${MINER_DATA_PATH}
        target: /runtime/miner.sqlite3
      - type: bind
        source: ${MINER_WALLET_FILE}
        target: /runtime/miner-wallet.json
        read_only: true
    restart: unless-stopped
